<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>溫馨房租管家 🏠</title>
    <style>
        :root {
            --primary-color: #ffb7b2;
            --secondary-color: #ffdac1;
            --bg-color: #fff9f9;
            --text-color: #6d6875;
            --card-bg: #ffffff;
            --button-hover: #ff9aa2;
        }

        body {
            font-family: "微軟正黑體", "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            max-width: 1000px;
            width: 100%;
        }

        /* 左側控制面板 */
        .control-panel {
            flex: 1;
            min-width: 300px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 2px solid var(--secondary-color);
        }

        h2 {
            color: #b5838d;
            text-align: center;
            margin-bottom: 25px;
            font-weight: bold;
        }

        .input-group {
            margin-bottom: 20px;
            background: #fff5f5;
            padding: 15px;
            border-radius: 15px;
            border: 1px dashed #ffb7b2;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #e5989b;
        }

        .input-group input[type="file"] {
            width: 100%;
            margin-bottom: 10px;
            font-size: 0.9em;
        }

        /* 統一輸入框樣式 */
        .input-group input[type="number"], 
        .input-group input[type="text"] {
            width: 90%; /* 留一點邊距 */
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            color: #555;
            background-color: #fff;
            margin-bottom: 8px; /* 增加間距 */
        }
        
        .input-group input[type="text"] {
            background-color: #fffbfb;
            border-color: #ffdac1;
        }

        .hint {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }

        button.generate-btn {
            width: 100%;
            padding: 15px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(255, 183, 178, 0.4);
            margin-top: 10px;
        }

        button.generate-btn:hover {
            background-color: var(--button-hover);
            transform: translateY(-2px);
        }

        /* 右側帳單預覽 */
        .bill-preview {
            flex: 1;
            min-width: 350px;
            display: none; /* 初始隱藏 */
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .bill-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
            border: 8px solid var(--secondary-color);
        }

        .bill-header {
            text-align: center;
            border-bottom: 2px dashed #eee;
            padding-bottom: 20px;
            margin-bottom: 20px;
        }

        .bill-header h1 {
            margin: 0;
            color: #b5838d;
            font-size: 24px;
        }

        .bill-header .date {
            color: #aaa;
            margin-top: 5px;
            font-size: 14px;
        }

        .bill-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .bill-item.total {
            border-top: 2px solid #ffb7b2;
            padding-top: 15px;
            margin-top: 20px;
            font-weight: bold;
            font-size: 20px;
            color: #e5989b;
        }

        .bill-item .label {
            display: flex;
            align-items: center;
            gap: 8px;
            max-width: 65%; /* 防止文字過長 */
        }

        .footer-msg {
            margin-top: 30px;
            padding: 15px;
            background-color: #fff0f5;
            border-radius: 10px;
            font-size: 14px;
            line-height: 1.6;
            color: #888;
            text-align: center;
            border: 1px solid #ffccd5;
        }

        /* 裝飾用 */
        .icon {
            font-size: 1.2em;
            min-width: 25px; /* 確保圖標對齊 */
        }

        .ocr-status {
            font-size: 12px;
            color: #2a9d8f;
            display: none;
            margin-top: 5px;
        }

    </style>
</head>
<body>

<div class="container">
    <!-- 設定區域 -->
    <div class="control-panel">
        <h2>🏠 房租管理設定</h2>
        
        <div class="input-group">
            <label>1. 每月固定租金</label>
            <input type="number" id="baseRent" value="13000" placeholder="輸入租金金額">
        </div>

        <div class="input-group">
            <label>2. 上傳電費單 (圖檔1)</label>
            <input type="file" id="fileElec" accept="image/*" onchange="mockScan('elec', 3133)">
            <input type="number" id="amountElec" placeholder="自動判定金額" value="0">
            <div id="status-elec" class="ocr-status">✨ 已讀取電費金額</div>
        </div>

        <div class="input-group">
            <label>3. 上傳水費單 (圖檔2)</label>
            <input type="file" id="fileWater" accept="image/*" onchange="mockScan('water', 566)">
            <input type="number" id="amountWater" placeholder="自動判定金額" value="0">
            <div id="status-water" class="ocr-status">💧 已讀取水費金額</div>
        </div>

        <!-- 修改區域：其他1 -->
        <div class="input-group">
            <label>4. 其他 1 (圖檔3)</label>
            <input type="text" id="noteOther1" placeholder="備註費用名稱 (例如: 瓦斯費)" value="瓦斯費">
            <input type="file" id="fileOther1" accept="image/*" onchange="mockScan('other1', 900)">
            <input type="number" id="amountOther1" placeholder="自動判定或輸入金額" value="0">
            <div id="status-other1" class="ocr-status">📝 已讀取金額</div>
        </div>

        <!-- 修改區域：其他2 -->
        <div class="input-group">
            <label>5. 其他 2</label>
            <input type="text" id="noteOther2" placeholder="備註費用名稱 (例如: 網路費/修繕費)" value="">
            <input type="file" id="fileOther2" accept="image/*" onchange="mockScan('other2', 0)">
            <input type="number" id="amountOther2" placeholder="輸入金額 (減項請加負號)" value="0">
            <div class="hint">*若為減項請輸入負號 (例如 -500)</div>
            <div id="status-other2" class="ocr-status">📂 檔案已上傳</div>
        </div>

        <button class="generate-btn" onclick="generateBill()">🖨️ 生成本月帳單</button>
    </div>

    <!-- 帳單顯示區域 -->
    <div class="bill-preview" id="billPreview">
        <div class="bill-card">
            <div class="bill-header">
                <h1>🏠 本月費用明細單</h1>
                <div class="date" id="billDate">2026年 04月</div>
            </div>

            <div class="bill-content">
                <div class="bill-item">
                    <span class="label"><span class="icon">🏘️</span> 房屋租金</span>
                    <span id="displayRent">$0</span>
                </div>
                <div class="bill-item">
                    <span class="label"><span class="icon">⚡</span> 電費應繳</span>
                    <span id="displayElec">$0</span>
                </div>
                <div class="bill-item">
                    <span class="label"><span class="icon">💧</span> 水費應繳</span>
                    <span id="displayWater">$0</span>
                </div>
                
                <!-- 動態名稱項目 -->
                <div class="bill-item">
                    <span class="label">
                        <span class="icon">📝</span> 
                        <span id="labelOther1">瓦斯費</span> <!-- 動態名稱 -->
                    </span>
                    <span id="displayOther1">$0</span>
                </div>
                <div class="bill-item">
                    <span class="label">
                        <span class="icon">🔖</span> 
                        <span id="labelOther2">其他</span> <!-- 動態名稱 -->
                    </span>
                    <span id="displayOther2">$0</span>
                </div>
                
                <div class="bill-item total">
                    <span>合計應繳總金額</span>
                    <span id="displayTotal">$0</span>
                </div>
            </div>

            <div class="footer-msg">
                親愛的房客您好～ 😊<br>
                這是本月份的租金，確認無誤後再麻煩您撥空匯款。<br>
                匯款完成後，請傳個訊息通知我查收喔！<br>
                謝謝您的愛護與配合，祝居住愉快 🏠✨
            </div>
        </div>
    </div>
</div>

<script>
    // 設定當前月份
    const date = new Date();
    document.getElementById('billDate').innerText = `${date.getFullYear()}年 ${date.getMonth() + 1}月`;

    // 模擬 OCR 辨識與檔案讀取
    function mockScan(type, amount) {
        const upperType = type.charAt(0).toUpperCase() + type.slice(1);
        const fileInput = document.getElementById('file' + upperType);
        const amountInput = document.getElementById('amount' + upperType);
        const statusDiv = document.getElementById('status-' + type);

        if (fileInput.files && fileInput.files[0]) {
            statusDiv.style.display = 'none';
            amountInput.style.backgroundColor = '#f0f0f0';
            
            setTimeout(() => {
                if(amount !== 0) {
                    amountInput.value = amount;
                }
                amountInput.style.backgroundColor = '#e8f5e9';
                amountInput.animate([
                    { transform: 'scale(1)' },
                    { transform: 'scale(1.05)' },
                    { transform: 'scale(1)' }
                ], { duration: 300 });

                statusDiv.style.display = 'block';
            }, 800);
        }
    }

    function formatCurrency(num) {
        return new Intl.NumberFormat('zh-TW', { style: 'currency', currency: 'TWD', minimumFractionDigits: 0 }).format(num);
    }

    function generateBill() {
        // 取得金額
        const rent = parseInt(document.getElementById('baseRent').value) || 0;
        const elec = parseInt(document.getElementById('amountElec').value) || 0;
        const water = parseInt(document.getElementById('amountWater').value) || 0;
        const other1 = parseInt(document.getElementById('amountOther1').value) || 0;
        const other2 = parseInt(document.getElementById('amountOther2').value) || 0;

        // 取得備註名稱 (如果使用者沒填，給預設值)
        const note1 = document.getElementById('noteOther1').value.trim() || "其他 1";
        const note2 = document.getElementById('noteOther2').value.trim() || "其他 2";

        // 計算總和
        const total = rent + elec + water + other1 + other2;

        // 更新帳單數值
        document.getElementById('displayRent').innerText = formatCurrency(rent);
        document.getElementById('displayElec').innerText = formatCurrency(elec);
        document.getElementById('displayWater').innerText = formatCurrency(water);
        document.getElementById('displayOther1').innerText = formatCurrency(other1);
        document.getElementById('displayOther2').innerText = formatCurrency(other2);
        document.getElementById('displayTotal').innerText = formatCurrency(total);

        // 更新帳單中的項目名稱
        document.getElementById('labelOther1').innerText = note1;
        document.getElementById('labelOther2').innerText = note2;

        // 顯示
        const previewSection = document.getElementById('billPreview');
        previewSection.style.display = 'block';
        previewSection.scrollIntoView({ behavior: 'smooth' });
    }
</script>

</body>
</html>
